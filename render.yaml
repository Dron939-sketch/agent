# Render Blueprint для Фреди.
# https://render.com/docs/blueprint-spec
#
# Применить:
#   1. В Render Dashboard → New → Blueprint → выбрать этот репо.
#   2. Render распарсит файл и предложит создать сервисы.
#   3. После создания задай секретные env (помечены `sync: false`)
#      в Settings → Environment.
#
# Env vars сгруппированы по ролям. Всё, что `sync: false`, заполняется
# вручную в Dashboard. Всё, что опционально — можно оставить пустым,
# код gracefully деградирует.

services:
  # ============ Backend API ============
  - type: web
    name: agent
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # --- Core ---
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: PORT
        value: "10000"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: agent-db
          property: connectionString
      - key: SELF_PUBLIC_URL
        value: https://agent-ynlg.onrender.com
      - key: SENTRY_DSN
        sync: false

      # --- LLM providers (at least one required) ---
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false  # опционально: http://host:11434 для локального fallback

      # --- Voice: STT (Deepgram) ---
      - key: DEEPGRAM_API_KEY
        sync: false

      # --- Voice: TTS (Yandex madirus + optional ElevenLabs) ---
      - key: YANDEX_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: ELEVENLABS_MODEL
        sync: false

      # --- Voice emotion (Hume AI) ---
      - key: HUME_API_KEY
        sync: false

      # --- Image generation (Replicate FLUX) ---
      - key: REPLICATE_API_TOKEN
        sync: false

      # --- Tools ---
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        sync: false

      # --- Push notifications (VAPID) ---
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:admin@freddy.local

      # --- VAD ---
      - key: VAD_MODE
        value: webrtc

      # --- Integrations (all optional; plugin disabled if empty) ---
      # Telegram bot
      - key: TELEGRAM_BOT_TOKEN
        sync: false

      # Spotify (music_play / music_pause / ...)
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_REFRESH_TOKEN
        sync: false

      # Notion
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DEFAULT_PAGE_ID
        sync: false

      # Google Calendar (service account JSON)
      - key: GOOGLE_CALENDAR_CREDENTIALS_JSON
        sync: false
      - key: GOOGLE_CALENDAR_ID
        sync: false

      # Email (IMAP + SMTP)
      - key: EMAIL_ADDRESS
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_IMAP_HOST
        sync: false
      - key: EMAIL_IMAP_PORT
        sync: false
      - key: EMAIL_SMTP_HOST
        sync: false
      - key: EMAIL_SMTP_PORT
        sync: false

      # Home Assistant
      - key: HASS_URL
        sync: false
      - key: HASS_TOKEN
        sync: false

      # Vector store (optional — defaults to SQL-backed store)
      - key: QDRANT_URL
        sync: false
      - key: REDIS_URL
        sync: false

      # CORS (optional extra origins, comma-separated)
      - key: CORS_ALLOW_ORIGINS
        sync: false

  # ============ Frontend (Next.js 14) ============
  - type: web
    name: agent-frontend
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    healthCheckPath: /
    autoDeploy: true
    envVars:
      # BACKEND_API_URL — RUNTIME server-side env для Next.js rewrites().
      # Читается только сервером Next.js при старте, в бандл не попадает.
      # Позволяет браузеру ходить на same-origin (`/api/*`), а Next.js
      # сервер проксирует запросы на бэкенд (intra-Render, быстро).
      # Это критично для РФ-пользователей без VPN: больше никаких прямых
      # браузерных TLS-коннектов к onrender.com/cloudflare.
      - key: BACKEND_API_URL
        value: https://agent-ynlg.onrender.com
      # NEXT_PUBLIC_API_URL нужен ТОЛЬКО для WebSocket (Next.js rewrites
      # не умеют проксировать HTTP Upgrade). Если вы ставите фронт за
      # свой собственный Caddy/nginx с поддержкой WS — этот env можно
      # удалить и WS пойдут через same-origin.
      - key: NEXT_PUBLIC_API_URL
        value: https://agent-ynlg.onrender.com
      - key: NEXT_PUBLIC_VAPID_PUBLIC_KEY
        sync: false
      - key: NEXT_PUBLIC_VAD_MODE
        value: webrtc
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"

databases:
  - name: agent-db
    plan: free
    databaseName: freddy
    user: freddy
